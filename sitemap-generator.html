<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sitemap Generator</title>
<style>
  body { font-family: monospace; padding: 2rem; background: #1a1a2e; color: #e0e0e0; }
  #status { color: #90ee90; margin-bottom: 1rem; font-size: 1rem; min-height: 1.5rem; }
  #status.err { color: #ff6b6b; }
  pre { background: #0d0d1a; padding: 1.5rem; border-radius: 6px; white-space: pre-wrap; font-size: 0.75rem; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
  button { background: #4a6fa5; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<p id="status">Click Generate to fetch all articles.</p>
<button onclick="generate()">Generate Sitemap</button>
<pre id="out"></pre>
<script>
const SUPA_URL = 'https://clfpzfualnormrgjmujb.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsZnB6ZnVhbG5vcm1yZ2ptdWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2MDI5NzAsImV4cCI6MjA1NjE3ODk3MH0.5kPPRuYGBQgLkuDjN6DPy3jcVxgCZvUL4U3yAhaqHwE';

function slug(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
}

async function generate() {
  const status = document.getElementById('status');
  const out = document.getElementById('out');
  status.className = '';
  status.textContent = 'Fetching from Supabase...';
  out.textContent = '';
  try {
    const res = await fetch(
      SUPA_URL + '/rest/v1/posts?select=title,slug,category,date&order=date.desc&limit=10000',
      { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
    const posts = await res.json();

    const statics = [
      ['https://www.animasapient.xyz/', 'weekly', '1.0', ''],
      ['https://www.animasapient.xyz/about', 'monthly', '0.6', ''],
      ['https://www.animasapient.xyz/philosophy', 'weekly', '0.8', ''],
      ['https://www.animasapient.xyz/religion-spirituality', 'weekly', '0.8', ''],
      ['https://www.animasapient.xyz/geography', 'weekly', '0.8', ''],
      ['https://www.animasapient.xyz/culture', 'weekly', '0.8', ''],
    ];

    const articles = posts.map(p => [
      'https://www.animasapient.xyz/' + slug(p.category) + '/' + (p.slug || slug(p.title)),
      'monthly', '0.9', p.date || ''
    ]);

    const xml = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
      + [...statics, ...articles].map(([loc, freq, pri, lastmod]) =>
          '  <url>\n    <loc>' + loc + '</loc>' +
          (lastmod ? '\n    <lastmod>' + lastmod + '</lastmod>' : '') +
          '\n    <changefreq>' + freq + '</changefreq>\n    <priority>' + pri + '</priority>\n  </url>'
        ).join('\n')
      + '\n</urlset>';

    out.textContent = xml;
    status.textContent = '✓ ' + posts.length + ' articles. Copy XML above into sitemap.xml on GitHub.';
  } catch(e) {
    status.className = 'err';
    status.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
