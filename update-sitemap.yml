name: Update Sitemap

on:
  schedule:
    - cron: '0 3 * * *'   # runs every day at 3am UTC
  push:
    branches: [main]       # also runs whenever you push to main
  workflow_dispatch:       # lets you trigger it manually from GitHub Actions tab

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch posts and generate sitemap.xml
        env:
          SUPA_URL: https://clfpzfualnormrgjmujb.supabase.co
          SUPA_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsZnB6ZnVhbG5vcm1yZ2ptdWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODk5MjcsImV4cCI6MjA4NzE2NTkyN30.eq66TP4GNT5kbOfanARkW9rLoGZQWnvhTC-xx-_vuKw
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, re

          SUPA_URL = os.environ['SUPA_URL']
          SUPA_KEY = os.environ['SUPA_KEY']

          req = urllib.request.Request(
            SUPA_URL + '/rest/v1/posts?select=title,slug,category,date&order=date.desc&limit=10000',
            headers={'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY}
          )
          with urllib.request.urlopen(req) as r:
            posts = json.loads(r.read())

          def slug(s):
            s = (s or '').lower()
            s = re.sub(r'[^a-z0-9]+', '-', s)
            return s.strip('-')

          BASE = 'https://www.animasapient.xyz'

          static = [
            (BASE + '/', 'weekly', '1.0', ''),
            (BASE + '/about', 'monthly', '0.6', ''),
            (BASE + '/philosophy', 'weekly', '0.8', ''),
            (BASE + '/religion-spirituality', 'weekly', '0.8', ''),
            (BASE + '/geography', 'weekly', '0.8', ''),
            (BASE + '/culture', 'weekly', '0.8', ''),
          ]

          articles = [
            (BASE + '/' + slug(p['category']) + '/' + (p.get('slug') or slug(p['title'])),
             'monthly', '0.9', p.get('date', ''))
            for p in posts
          ]

          def url_block(loc, freq, pri, lastmod):
            lastmod_line = f'\n    <lastmod>{lastmod}</lastmod>' if lastmod else ''
            return f'  <url>\n    <loc>{loc}</loc>{lastmod_line}\n    <changefreq>{freq}</changefreq>\n    <priority>{pri}</priority>\n  </url>'

          xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          xml += '\n'.join(url_block(*u) for u in static + articles)
          xml += '\n</urlset>\n'

          with open('sitemap.xml', 'w') as f:
            f.write(xml)

          print(f'Generated sitemap with {len(articles)} articles.')
          PYEOF

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "Auto-update sitemap.xml [$(date -u +%Y-%m-%d)]"
          git push
